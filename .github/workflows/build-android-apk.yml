name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK with EAS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Install all workspace dependencies
        run: pnpm install

      - name: Setup Expo and EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Register project with Expo (first time only)
        working-directory: artifacts/my-docs
        run: eas build:configure --platform android --non-interactive
        continue-on-error: true

      - name: Build Android APK
        working-directory: artifacts/my-docs
        run: eas build --platform android --profile preview --non-interactive --output-metro-config-path metro.config.js
        env:
          EXPO_NO_TELEMETRY: 1
